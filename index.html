<!DOCTYPE html lang="en-AUS">
    <head>
        <title>New Vegas Character Creator</title>
        <link rel="icon" href="fav.ico" type="image/x-icon">
        <script src="main.js" defer></script>
        <style>
            html {
                background: #333;
                color: white;
                font: 16px sans-serif;
                padding: var(--spacer);
                --border: 1px solid grey;
                --gap: 5px;
                --spacer: calc(var(--gap) * 2);
            }

            header {
                background: #333;
                display: grid;
                grid-column: repeat(1fr);
                gap: var(--spacer);
                top: 0;
                max-width: 1920px;
                padding-bottom: var(--spacer);
                position: sticky;
                z-index: 1;
                    
                section {
                    display: flex;
                    gap: 0 var(--spacer);
                    justify-content: space-between;
                    height: max-content;

                    article {
                        width: 210px;
                    }
                }
            }


            label {
                border: var(--border);
                display: flex;
                gap: var(--gap);
                justify-content: flex-start;
                padding: 5px;

                &:first-child {
                    border-width: 2.5px;
                    border-top-left-radius: 5px;
                    border-top-right-radius: 5px;
                    background: #222;
                    grid-auto-columns: unset;
                }

                &:last-child {
                    border-bottom-left-radius: 5px;
                    border-bottom-right-radius: 5px;
                }

                span {
                    width: 100%;
                    display: block;
                }

                input {
                    color: white;
                    background: transparent;
                    border: none;
                    border-radius: 4px;
                    font: inherit;
                    width: 50px;
                    
                    &:disabled {
                        font-weight: bold;
                        max-width: 3ch;
                    }

                    &[type=checkbox] {
                        max-width: 15px;

                        &:is(:checked, :disabled) {
                            filter: invert(1);
                        }
                    }

                    &:not([type=checkbox]) {
                        margin-left: auto;
                        
                        + input {
                            margin-left: 0;
                        }
                    }
                }
            }
            body {
                display: grid;
                gap: 50px;
            }

            #perks,
            #noRequirements {
            display: flex;
            gap: 0 var(--spacer);
            justify-content: space-between;
            max-width: 1920px;

                section {
                    flex: 1;
                    max-width: 210px;
                }

               article {
                    background: #555;
                    border: var(--border);
                    border-radius: 10px;
                    box-sizing: border-box;
                    padding: 0 10px 10px;
                    margin-bottom: 20px;
                    width: 210px;

                    &.unrequired {
                        border-color: crimson;
                        opacity: 0.5;
                        order: 1;
                    }
                }
            }

            #noRequirements {
                flex-wrap: wrap;
            }

            :is(header, #perks) section article {
                &#strength label:first-child,
                &.strength {
                    background-color: peru;
                }
                &#perception label:first-child,
                &.perception {
                    background-color: SeaGreen ;
                }
                &#endurance label:first-child,
                &.endurance {
                    background-color: indianred ;
                }
                &#charisma label:first-child,
                &.charisma {
                    background-color: RebeccaPurple ;
                }
                &#intelligence label:first-child,
                &.intelligence {
                    background-color: SteelBlue  ;
                }
                &#agility label:first-child,
                &.agility {
                    background-color: orchid ;
                }
                &#luck label:first-child,
                &.luck {
                    background-color: GoldenRod ;
                }
            }

        </style>
    </head>


    <body></body>
</html>
